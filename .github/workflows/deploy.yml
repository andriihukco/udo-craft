name: Deploy

on:
  push:
    branches: [main, develop]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

jobs:
  check:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build:shared && npm run build:ui

      - name: Test admin
        run: npm run test --workspace=admin

      - name: Test client
        run: npm run test --workspace=client

  deploy-admin:
    name: Deploy Admin
    needs: [check, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install dependencies
        run: npm ci

      - name: Deploy Admin to Vercel
        id: deploy-admin
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            URL=$(vercel deploy --prod --yes \
              --token=${{ secrets.VERCEL_TOKEN }} \
              --scope=${{ secrets.VERCEL_ORG_ID }} \
              --cwd=apps/admin)
          else
            URL=$(vercel deploy --yes \
              --token=${{ secrets.VERCEL_TOKEN }} \
              --scope=${{ secrets.VERCEL_ORG_ID }} \
              --cwd=apps/admin)
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Admin deployed to: $URL"

      - name: Output Admin URL
        run: echo "Admin URL ${{ steps.deploy-admin.outputs.url }}"

  deploy-client:
    name: Deploy Client
    needs: [check, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install dependencies
        run: npm ci

      - name: Deploy Client to Vercel
        id: deploy-client
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            URL=$(vercel deploy --prod --yes \
              --token=${{ secrets.VERCEL_TOKEN }} \
              --scope=${{ secrets.VERCEL_ORG_ID }} \
              --cwd=apps/client)
          else
            URL=$(vercel deploy --yes \
              --token=${{ secrets.VERCEL_TOKEN }} \
              --scope=${{ secrets.VERCEL_ORG_ID }} \
              --cwd=apps/client)
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Client deployed to: $URL"

      - name: Output Client URL
        run: echo "Client URL ${{ steps.deploy-client.outputs.url }}"
